<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마그네슘 권장량 계산기</title>
<style>
body {
    font-family: Arial, sans-serif;
    background:#111;
    color:#fff;
    padding:20px;
}
.container {
    max-width:500px;
    margin:auto;
    background:#1c1c1c;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
}
h1 {
    text-align:center;
}
label {
    display:block;
    margin-top:15px;
}
input, select {
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:5px;
    border:none;
}
button {
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#00c853;
    border:none;
    color:#fff;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}
button:hover {
    background:#00a843;
}
.result {
    margin-top:20px;
    padding:15px;
    background:#222;
    border-radius:5px;
}
</style>
</head>
<body>

<div class="container">
<h1>맞춤형 마그네슘 권장량 계산기</h1>

<label>성별</label>
<select id="gender">
<option value="male">남성</option>
<option value="female">여성</option>
</select>

<label>나이</label>
<input type="number" id="age" placeholder="예: 35">

<label>운동 빈도</label>
<select id="activity">
<option value="low">거의 안함</option>
<option value="medium">주 2~3회</option>
<option value="high">주 4회 이상</option>
</select>

<button onclick="calculate()">계산하기</button>

<div class="result" id="result" style="display:none;"></div>
</div>

<script>
function calculate() {
    const gender = document.getElementById("gender").value;
    const age = parseInt(document.getElementById("age").value);
    const activity = document.getElementById("activity").value;
    let base = 0;

    if(gender === "male") base = 400;
    else base = 310;

    if(age > 50) base -= 20;

    if(activity === "medium") base += 30;
    if(activity === "high") base += 60;

    let resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    resultDiv.innerHTML = `
        <h3>당신의 하루 권장 마그네슘 섭취량</h3>
        <p><strong>${base} mg</strong></p>
        <p>※ 개인 건강 상태에 따라 차이가 있을 수 있습니다.</p>
    `;
}
</script>

</body>
</html>
